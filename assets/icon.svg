<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <!-- Background -->
  <rect width="20" height="20" rx="4" fill="#1E3A5F"/>

  <!-- Level 1 chip (top, full width) -->
  <rect x="2" y="2.5" width="16" height="4" rx="2" fill="#378ADD"/>

  <!-- Level 2 chips (middle, indented) -->
  <rect x="4" y="8" width="6" height="3.5" rx="1.75" fill="#0F9B8E"/>
  <rect x="11" y="8" width="7" height="3.5" rx="1.75" fill="#B2DDD9"/>

  <!-- Level 3 chips (bottom, more indented) -->
  <rect x="6" y="13" width="4" height="3" rx="1.5" fill="#7B5EA7"/>
  <rect x="11" y="13" width="4" height="3" rx="1.5" fill="#D4BEF0"/>
</svg>
